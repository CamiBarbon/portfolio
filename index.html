<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAMILA BARBON</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap" rel="stylesheet">

<style>
  html { font-family: "Segoe UI", system-ui, -apple-system, sans-serif;}
  body { margin: 0; overflow: hidden; }

  .menu-item {
  position: relative;
  opacity: 0.8;
  transition: all 0.3s ease;
}


  .rubik-glitch-regular {
    font-family: "Rubik Glitch", system-ui;
    font-weight: 400;
    font-style: normal;
  }

  header {
    height: 80px;
    backdrop-filter: blur(6px);
    background: rgba(255,255,255,0.15);
  }

.panel {
  flex: 1;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.6s ease;
}

  .bg-layer {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 0.6s ease;
    z-index: 0;
  }

  .panel::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 1;
  }

.panel-text {
  position: absolute;
  left: 8%;
  top: 50%;
  transform: translateY(80%);
  z-index: 5;

  color: white;
  font-size: clamp(3rem, 8vw, 8rem);
  line-height: 0.9;
  letter-spacing: 0.05em;
}

.state-enter {
  animation: stateEnter 0.9s cubic-bezier(.22,.8,.2,1);
}
.modal-link {
  font-weight: 400;
  letter-spacing: 0.05em;
}
@keyframes stateEnter {
  0% {
    transform: translateX(120vw) translateY(80%);
    opacity: 0;
  }
  60% {
    transform: translateX(-20px) translateY(80%);
    opacity: 1;
  }
  100% {
    transform: translateX(0) translateY(80%);
    opacity: 1;
  }
}
.modal-overlay {
  position: fixed;
  top: 100px;
  bottom: 100px;
  left: 100px;
  right: 100px;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  overflow: hidden;
}
.modal-content {
  position: relative;
  text-align: center;
  width: min(900px, 90%);
  max-height: 80vh;
  color: white;
  padding: 40px;
  border-radius: 2rem;
}

.modal-slice {
  overflow: hidden;
  position: relative;
}
.modal-active .panel-text {
  opacity: 0;
  pointer-events: none;
}

.modal-line {
  text-align: center;
  font-size: clamp(1rem, 3vw, 2rem);
}


.modal-active .panel::after {
  background: rgba(0,0,0,0.6);
}
:root {
  --modal-radius: 2rem;
}

.modal-close {
  position: absolute;

  top: calc(var(--modal-radius) / 2);
  right: calc(var(--modal-radius) / 2);

  font-size: 1.6rem;
  line-height: 1;

  width: 36px;
  height: 36px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  cursor: pointer;

  transition: transform 0.25s ease, opacity 0.25s ease;
}
.rgb-split {
  position: relative;
  display: inline-block;
}

.rgb-split::before,
.rgb-split::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  top: 0;
  opacity: 0;
  pointer-events: none;
}

.rgb-split::before {
  color: rgb(40, 168, 151);
  transform: translateX(-3px);
}

.rgb-split::after {
  color: rgb(141, 33, 230);
  transform: translateX(3px);
}

.rgb-active::before,
.rgb-active::after {
  opacity: 0.7;
  animation: rgbShift 0.4s ease-out forwards;
}

@keyframes rgbShift {
  0% { transform: translateX(-6px); }
  50% { transform: translateX(4px); }
  100% { transform: translateX(0); opacity: 0; }
}
.modal-close:hover {
  transform: rotate(90deg);
}
.modal-active .panel {
  animation: subtleDrift 9s ease-in-out infinite alternate;
}

@keyframes subtleDrift {
  from { transform: scale(1.05); }
  to   { transform: scale(1.08); }
}
.hidden {
  display: none;
}

.scroll-indicator {
  position: fixed;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%) rotate(-90deg);
  font-size: clamp(5rem, 9vw, 9rem);
  color: white;
  opacity: 0.85;
  z-index: 1500;
  pointer-events: none;
  line-height: 1;

  animation: bounceArrow 1.4s ease-in-out infinite;
  transition: opacity 0.4s ease;
}
/* cuando hay modal */
.modal-active .scroll-indicator {
  opacity: 0.2;
}

@keyframes bounceArrow {

  0%   { transform: translate(-50%, 0) rotate(-90deg); }
  50%  { transform: translate(-50%, -18px) rotate(-90deg); }
  100% { transform: translate(-50%, 0) rotate(-90deg); }

}
.mobile-menu {
  position: fixed;
  top: 80px;
  left: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 25px;
  background: transparent;
  backdrop-filter: none;

  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(.22,.8,.2,1);
  z-index: 3500;
}

.mobile-menu.active {
  max-height: 400px;
}

.mobile-item {
  color: white;
  font-family: "Rubik Glitch", system-ui;
  font-size: 2rem;
  padding-right: 2rem;
}
@media (min-width: 768px) {

  .menu-item {
    position: relative;
    display: inline-block;
    cursor: pointer;
    transition: letter-spacing 0.2s ease;
  }

  .menu-item::before,
  .menu-item::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    pointer-events: none;
  }

  .menu-item::before {
    color: rgb(0, 60, 255);
    transform: translateX(-2px);
  }

  .menu-item::after {
    color: rgb(236, 87, 157);
    transform: translateX(2px);
  }

  .menu-item:hover {
    letter-spacing: 0.08em;
  }

  .menu-item:hover::before,
  .menu-item:hover::after {
    opacity: 0.7;
    animation: navRGBGlitch 0.18s infinite alternate;
  }

}
/* MOBILE NAV */
@media (max-width: 768px) {
  header {
    justify-content: space-between;
  }

.modal-content {
  text-align: center;
  width: 100%;
  height: calc(100vh - 80px);
  max-height: none;
  border-radius: 0;
  padding: 60px 25px 40px 25px;
}

  .modal-close {
  top: 20px;
  right: 20px;
  font-size: 22px;
}
.modal-overlay {
  top: 80px;   /* respeta el header */
  bottom: 0;
  left: 0;
  right: 0;
}

.modal-overlay::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  mix-blend-mode: overlay;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.07) 0px,
      rgba(0,0,0,0.15) 2px
    );
}

.modal-overlay.crt::before {
  animation: crtFlash 0.7s ease-out forwards;
}

@keyframes crtFlash {
  0%   { opacity: 0.9; }
  40%  { opacity: 0.5; }
  100% { opacity: 0; }
}



@keyframes navRGBGlitch {
  0%   { transform: translateX(-2px); }
  50%  { transform: translateX(2px); }
  100% { transform: translateX(-1px); }
}
}
</style>
</head>

<body class="bg-white text-black">

<!-- NAV -->
<header class="fixed top-0 left-0 w-full h-[80px] flex items-center justify-between px-8 z-[3000] bg-transparent">

  <div class="tracking-wide text-white rubik-glitch-regular text-2xl md:text-4xl px-[6%]">
         <a  class="menu-item" href="index.html">CAMI BARBON</a>   
  </div>
<button id="menuToggle" class="md:hidden text-white text-4xl z-[4000]">
  ☰
</button>
<nav id="mainNav" class="hidden md:flex gap-10 text-white rubik-glitch-regular text-4xl tracking-wide">
<a class="menu-item" data-key="BIO">BIO</a>
<a class="menu-item" data-key="CV">CV</a>
<a class="menu-item" data-key="TATUANDO">TATUANDO</a>
<a class="menu-item" data-key="CONTACTO">CONTACTO</a>
</nav>
<div id="mobileMenu" class="mobile-menu md:hidden">
<a href="#" class="mobile-item" data-key="BIO">SOBRE MI</a>
<a href="#" class="mobile-item" data-key="CV">MI CV</a>
<a href="#" class="mobile-item" data-key="TATUANDO">TATUANDO</a>
<a href="#" class="mobile-item" data-key="CONTACTO">CONTACTO</a>
</div>
</header>

<!-- PANELS -->
<main class="absolute inset-0 flex flex-col">
  <div id="panels" class="flex flex-col h-full"></div>
</main>
<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-content">
    <button id="modalClose" class="modal-close">✕</button>
    <div id="modalBody"></div>
  </div>
</div>
<div class="scroll-indicator rubik-glitch-regular">
  &lt;
</div>
<script>

// ==============================
// CONFIG
// ==============================

const tatuImages = Array.from({length: 10}, (_, i) => `img/tatu${i+1}.jpg`);
const dibuImages = Array.from({length: 11}, (_, i) => `img/dibu${i+1}.jpg`);
const fotoImages = Array.from({length: 9}, (_, i) => `img/foto${i+1}.jpg`);


const panelConfig = [
  { states: [" ", "", "Arte", "", " "," ", "Imagen"," "] },
  { states: [" ", "Diseño", " ", " ", "Multimedia", " ", "Desarrollo"] },
  { states: ["", "", ""] }
];
document.querySelectorAll(".menu-item").forEach(el => {
  el.setAttribute("data-text", el.innerText);
});
// ==============================
// GLITCH 
// ==============================
let glitchContainer = null;

function triggerGlitch(imageUrl) {

  // detectar dispositivo pesado
  const isTouch =
    'ontouchstart' in window || navigator.maxTouchPoints > 0;

  // menos slices solo en touch (desktop queda igual)
  const slices = isTouch ? 10 : (12 + Math.floor(Math.random() * 10));
  const sliceHeight = window.innerHeight / slices;

  // reutilizar contenedor si existe
  if (!glitchContainer) {
    glitchContainer = document.createElement("div");
    glitchContainer.style.position = "fixed";
    glitchContainer.style.inset = "0";
    glitchContainer.style.pointerEvents = "none";
    glitchContainer.style.zIndex = "4";
    glitchContainer.style.overflow = "hidden";
    document.body.appendChild(glitchContainer);
  }

  glitchContainer.innerHTML = ""; // limpiar sin destruir nodo

  const mode = Math.floor(Math.random() * 4);

  for (let i = 0; i < slices; i++) {

    const slice = document.createElement("div");
    slice.style.position = "absolute";
    slice.style.left = "0";
    slice.style.top = `${i * sliceHeight}px`;
    slice.style.width = "100%";
    slice.style.height = `${sliceHeight + 2}px`;
    slice.style.overflow = "hidden";

    const layer = document.createElement("div");
    layer.style.position = "absolute";
    layer.style.left = "0";
    layer.style.top = `-${i * sliceHeight}px`;
    layer.style.width = "100%";
    layer.style.height = "100vh";
    layer.style.backgroundImage = `url(${imageUrl})`;
    layer.style.backgroundSize = "cover";
    layer.style.backgroundPosition = "center";

    // 🔥 CLAVE PERFORMANCE
    layer.style.willChange = "transform, opacity, filter";
    layer.style.backfaceVisibility = "hidden";

    let offset = (Math.random() - 0.5) * 60; // antes 80

    if (mode === 0) {
      layer.style.filter = `invert(1) contrast(1.4) brightness(1.2)`;
    }

    if (mode === 1) {
      layer.style.filter = `contrast(1.3) hue-rotate(${Math.random()*360}deg)`;
    }

    if (mode === 2) {
      layer.style.filter = `grayscale(0.4) contrast(1.8) brightness(0.9)`;
    }

    if (mode === 3) {
      layer.style.filter = `contrast(1.6) saturate(0.6)`;
      offset *= 1.3; // antes 1.5
    }

    layer.style.transform = `translate3d(${offset}px,0,0)`;

    slice.appendChild(layer);
    glitchContainer.appendChild(slice);

    setTimeout(() => {
      layer.style.transform =
        `translate3d(${(Math.random() - 0.5) * 30}px,0,0)`;
      layer.style.opacity = Math.random() * 0.8 + 0.2;
    }, 40 + i * 10);

    setTimeout(() => {
      slice.style.opacity = "0";
    }, 200 + i * 20);
  }

  setTimeout(() => {
    glitchContainer.innerHTML = "";
  }, 520);
}
// ==============================
// PANEL CLASS
// ==============================

class Panel {

  constructor(states, positionIndex) {
    this.states = states;
    this.index = 0;
    this.positionIndex = positionIndex;
  }

  render() {

    this.el = document.createElement("div");
    this.el.className = "panel";

    this.bgLayer = document.createElement("div");
    this.bgLayer.className = "bg-layer";

    if (this.positionIndex === 0)
      this.bgLayer.style.backgroundPosition = "top center";

    if (this.positionIndex === 2)
      this.bgLayer.style.backgroundPosition = "bottom center";

    this.el.appendChild(this.bgLayer);

    this.textWrapper = document.createElement("div");
    this.textWrapper.className = "panel-text";

    this.textEl = document.createElement("div");
    this.textEl.className = "rubik-glitch-regular";

    this.textWrapper.appendChild(this.textEl);
    this.el.appendChild(this.textWrapper);

    return this.el;
  }

  next() {
    this.index = (this.index + 1) % this.states.length;
    return this.states[this.index] || "";
  }

 setState(text) {

  this.textEl.innerText = text;

  this.textWrapper.classList.remove("state-enter");
  void this.textWrapper.offsetWidth; // reset animation
  this.textWrapper.classList.add("state-enter");
}

setImage(img, trigger = true) {

  this.bgLayer.style.backgroundImage = `url(${img})`;

  if (trigger) {
    triggerGlitch(img);
  }
}
}
// ==============================
// INIT
// ==============================

const container = document.getElementById("panels");
container.innerHTML = "";

const panels = [];

panelConfig.forEach((config, i) => {
  const panel = new Panel(config.states, i);
  panels.push(panel);
  container.appendChild(panel.render());
});
// ===== ESTADO INICIAL CORRECTO =====
panels.forEach(p => p.setState(""));
updatePanelsFromStates([]);


const isTouchDevice =
  'ontouchstart' in window || navigator.maxTouchPoints > 0;

function advancePanels() {

  if (document.body.classList.contains("modal-active")) {

    // solo cambiar imágenes
    const currentStates = panels.map(p => p.textEl.innerText);
    updatePanelsFromStates(currentStates);

    return;
  }

  const states = panels.map(p => p.next());
  panels.forEach((p,i) => p.setState(states[i]));
  updatePanelsFromStates(states);
}

function updatePanelsFromStates(statesArray) {

  const cleanedStates = statesArray.map(s => s.trim()).filter(s => s !== "");

  // ===== TODOS VACÍOS =====
  if (cleanedStates.length === 0) {

    const pools = [dibuImages, tatuImages, fotoImages];

    panels.forEach((panel, i) => {

      const pool = pools[i % pools.length];
      const randomImg = pool[Math.floor(Math.random() * pool.length)];

      panel.setImage(randomImg, true); // 🔥 SIEMPRE glitch

    });

    return;
  }

  // ===== STATES ACTIVOS =====

  let combinedPool = [];

  cleanedStates.forEach(state => {

    if (state === "Arte")
      combinedPool = combinedPool.concat(dibuImages);

    if (state === "Imagen")
      combinedPool = combinedPool.concat(tatuImages);

    if (state === "Multimedia")
      combinedPool = combinedPool.concat(fotoImages);

    if (state === "Diseño")
      combinedPool = combinedPool.concat(tatuImages);

    if (state === "Desarrollo")
      combinedPool = combinedPool.concat(tatuImages);

  });

  combinedPool = [...new Set(combinedPool)];
  const shuffled = [...combinedPool].sort(() => 0.5 - Math.random());

  panels.forEach((panel, i) => {
    panel.setImage(shuffled[i % shuffled.length], true); // 🔥 SIEMPRE glitch
    if (!shuffled.length) return;
  });

}



// ==============================
// INTERACCIÓN SEGÚN DISPOSITIVO
// ==============================

// DESKTOP → solo wheel
if (!isTouchDevice) {

  window.addEventListener("wheel", (e) => {
    if (e.deltaY > 0) {
      advancePanels();
    }
  });

}

// MOBILE / TOUCH → solo click
if (isTouchDevice) {

  document.body.addEventListener("touchstart", (e) => {

    if (
      e.target.closest("header") ||
      e.target.closest("#modalOverlay") ||
      e.target.closest(".mobile-menu")
    ) {
      return;
    }

    advancePanels();

  }, { passive: true });

}
// ==============================
// IMAGE POOL GLOBAL
// ==============================

function getAllImagesPool() {
  return [
    ...dibuImages,
    ...tatuImages,
    ...fotoImages
  ];
}

// ==============================
// DESKTOP PREVIEW (STABLE CORE)
// ==============================

if (window.innerWidth >= 768) {

  let preview = document.createElement("img");
  preview.style.position = "fixed";
  preview.style.maxWidth = "28vw";
  preview.style.maxHeight = "60vh";
  preview.style.pointerEvents = "none";
  preview.style.zIndex = "9999";
  preview.style.boxShadow = "0 25px 60px rgba(0,0,0,0.45)";
  preview.style.objectFit = "contain";
  preview.style.display = "none";

  document.body.appendChild(preview);

  let currentX = 0;
  let currentY = 0;
  let targetX = 0;
  let targetY = 0;
  let previewInterval = null;
  let isInsidePanels = false;

  let horizontalImages = [];
  let verticalImages = [];
  let mode = "horizontal";
  let counter = 0;

  function preloadAndClassify() {
    getAllImagesPool().forEach(src => {
      const img = new Image();
      img.src = src;
      img.onload = () => {
        if (img.width >= img.height) {
          horizontalImages.push(src);
        } else {
          verticalImages.push(src);
        }
      };
    });
  }

  preloadAndClassify();

  function getNextImage() {

    if (counter >= 3) {
      mode = mode === "horizontal" ? "vertical" : "horizontal";
      counter = 0;
    }

    counter++;

    const arr = mode === "horizontal"
      ? horizontalImages
      : verticalImages;

    if (!arr.length) return null;

    return arr[Math.floor(Math.random() * arr.length)];
  }

  function animate() {
    const ease = 0.28;

    currentX += (targetX - currentX) * ease;
    currentY += (targetY - currentY) * ease;

    preview.style.left = currentX + "px";
    preview.style.top = currentY + "px";

    requestAnimationFrame(animate);
  }

  animate(); // 🔥 nunca se detiene

  panels.forEach(panel => {

    panel.el.addEventListener("mouseenter", (e) => {
 if (document.body.classList.contains("modal-active")) return;
      isInsidePanels = true;

      const imgSrc = getNextImage();
      if (imgSrc) preview.src = imgSrc;

      preview.style.display = "block";

      clearInterval(previewInterval);
      previewInterval = setInterval(() => {
        const next = getNextImage();
        if (next) preview.src = next;
      }, 2200);

    });

    panel.el.addEventListener("mousemove", (e) => {
if (document.body.classList.contains("modal-active")) return;
      const offset = 40;

      let x = e.clientX + offset;
      let y = e.clientY + offset;

      const rect = preview.getBoundingClientRect();

      const maxX = window.innerWidth - rect.width - 20;
      const maxY = window.innerHeight - rect.height - 20;

      targetX = Math.min(Math.max(20, x), maxX);
      targetY = Math.min(Math.max(20, y), maxY);

    });

    panel.el.addEventListener("mouseleave", () => {

      isInsidePanels = false;

      clearInterval(previewInterval);

      setTimeout(() => {
        if (!isInsidePanels) {
          preview.style.display = "none";
        }
      }, 40);

    });

  });

}
// ==============================
// MODAL LOGIC
// ==============================


const modalOverlay = document.getElementById("modalOverlay");
const modalBody = document.getElementById("modalBody");
const modalClose = document.getElementById("modalClose");

const modalContentData = {
  TATUANDO: `
    <h2 class="text-5xl mb-6 rubik-glitch-regular tracking-wide" >TATUANDO</h2>
    <p>Tatuajes en línea negra, sólidos y originales, desde 2021.  Conocé mis trabajos en
    <a href="https://instagram.com/camitatuando" target="_blank" class="modal-link">
      @camitatuando
    </a></p>
  `,
  BIO: `
    <h2 class="text-5xl mb-6 rubik-glitch-regular tracking-wide">BIO</h2>
    <p>Formada en bellas artes, fotografía y arte multimedial, soy una artista visual-digital interesada en procesos híbridos.</p>
  `,
  CV: `
    <h2 class="text-5xl mb-6 rubik-glitch-regular tracking-wide">CV</h2>
    <p>Producción audiovisual, comunicación digital y desarrollo web. 
    <br>¡Contratame!
    <a href="./img/camila-barbon-cv.pdf" target="_blank" class="modal-link">
      Descargar CV
    </a></p>
  `,
  CONTACTO: `
    <h2 class=" text-5xl mb-6 rubik-glitch-regular tracking-wide">CONTACTO</h2>
    <p>camibarbon@gmail.com<br>+54 11 30933666</p>
  `
};

function openModal(key) {
  const mobileMenu = document.getElementById("mobileMenu");
if (mobileMenu) {
  mobileMenu.classList.remove("active");
}
  document.body.classList.add("modal-active");

  const rawHTML = modalContentData[key];
  if (!rawHTML) return;

  modalBody.innerHTML = "";
modalOverlay.classList.remove("hidden");

requestAnimationFrame(() => {
  modalOverlay.classList.add("active");
  modalOverlay.classList.add("crt");
});

setTimeout(() => {
  modalOverlay.classList.remove("crt");
}, 700);

  const wrapper = document.createElement("div");
  wrapper.className = "modal-glitch-wrapper";

  const temp = document.createElement("div");
  temp.innerHTML = rawHTML;

const elements = Array.from(temp.children);

  elements.forEach((el, index) => {

  const slice = document.createElement("div");
  slice.className = "modal-slice";

const lineEl = document.createElement("div");

if (el.tagName === "H2") {
  lineEl.className =
    "modal-line rubik-glitch-regular tracking-wide text-4xl mb-6 rgb-split";
  lineEl.setAttribute("data-text", el.textContent);
} else {
  lineEl.className = "modal-line";
}

setTimeout(() => {
  lineEl.classList.add("rgb-active");
}, index * 120);
  lineEl.innerHTML = el.innerHTML;

  slice.appendChild(lineEl);
  wrapper.appendChild(slice);

  setTimeout(() => {
    lineEl.classList.add("state-center");
  }, index * 120);

});

  modalBody.appendChild(wrapper);
}
function closeModal() {

  modalOverlay.classList.remove("active");

  setTimeout(() => {
    modalOverlay.classList.add("hidden");
    document.body.classList.remove("modal-active");
  }, 400);
}
// ABRIR MODAL
function setupModalTriggers(selector) {
  document.querySelectorAll(selector).forEach(item => {
    item.addEventListener("click", (e) => {
      e.preventDefault();
      openModal(item.dataset.key);
    });
  });
}

setupModalTriggers(".menu-item");
setupModalTriggers(".mobile-item");

// CERRAR MODAL
modalClose.addEventListener("click", closeModal);

modalOverlay.addEventListener("click", (e) => {
  if (e.target === modalOverlay) {
    closeModal();
  }
});


const menuToggle = document.getElementById("menuToggle");

menuToggle.addEventListener("click", (e) => {
  e.stopPropagation();
  mobileMenu.classList.toggle("active");
});

// cerrar al tocar item
document.querySelectorAll(".mobile-item").forEach(link => {
  link.addEventListener("click", () => {
    mobileMenu.classList.remove("active");
  });
});
</script>
